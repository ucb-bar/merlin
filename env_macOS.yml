name: merlin-dev
channels:
  - conda-forge
dependencies:
  # 1. Python & Modern Package Manager
  - python=3.11
  - uv

  # 2. Build Tools
  - cmake
  - ninja
  - make
  - pkg-config
  - ccache

  # 3. Compilers (macOS relies heavily on Clang/LLVM)
  - clang
  - clangxx
  - lld

  # 4. System & Networking Libraries
  # (Wayland/X11/EGL are removed, macOS handles graphics natively)
  - glfw
  - libcurl
  - openssl
  - zstd
