schema_version: 1

target:
  name: qualcomm_adreno_vulkan
  display_name: Qualcomm Adreno Vulkan
  vendor: Qualcomm
  maturity: planned

platform:
  host_isa: aarch64
  operating_systems:
    - android
    - linux
  environments:
    - runtime-driver

execution_model:
  kind: simt_gpu
  attachment: device
  submission_model: queue_dispatch
  compiler_recovery_stage: runtime_only

isa:
  base: spirv64
  features:
    - vulkan
    - subgroup
  exposure:
    kind: hal_runtime
    needs_llvm_backend_changes: false
    needs_new_intrinsics: false
    needs_new_feature_bits: false
  state_model:
    kind: runtime_managed_device_state
  register_constraints:
    accumulator_register_file: null
    even_alignment_required: false
    vl_dependent: false

operations:
  compute:
    - name: simt_kernel
      native: true
      type_triples:
        - generic
    - name: matmul
      native: true
      type_triples:
        - f16*f16->f16
  movement:
    - device_copy
    - host_transfer
  synchronization:
    - semaphore
    - event

geometry:
  compute_array:
    kind: simt
  vector: {}
  native_tile_options:
    - [32, 8, 4]
  preferred_tiles:
    - [32, 8, 4]

memory:
  spaces:
    - name: global
      kind: dram
    - name: shared
      kind: shared_memory
    - name: registers
      kind: register_file
  preferred_layouts:
    lhs: row_major
    rhs: row_major
    result: row_major
  packing:
    requires_pack: false
    requires_unpack: false

numeric:
  legal_type_triples:
    - f16*f16->f16
  quantization:
    requantize_native: false
  rounding_modes:
    - rne
  saturation: false

runtime:
  required: true
  executable_format: vmfb_plus_spirv
  driver:
    backend_id: vulkan
    uri_schemes:
      - vulkan://adreno
  synchronization:
    semaphores: true
    timelines: true

verification:
  golden_model:
    available: true
    kind: host_reference
  simulator:
    available: false
    kind: none
  rtl:
    available: false
    kind: none
  perf_counters:
    available: false
    kind: none
  tolerances:
    fp16:
      atol: 0.01
      rtol: 0.01

access:
  model: remote_device
  sdk_requirements:
    - vulkan_sdk
    - adb
    - iree_vulkan
  credential_requirements: none
  availability_class: lab_hardware
  verification_gates:
    - compile_only
    - device_query
    - smoke_run

references:
  - docs/architecture/target_generator.md
  - docs/how_to/add_runtime_hal_driver.md
  - docs/reference/cli.md
