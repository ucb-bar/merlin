schema_version: 1

target:
  name: spacemit_x60_xsmtvdot
  display_name: SpacemiT X60 xSMTVDot
  vendor: SpacemiT
  maturity: experimental

platform:
  host_isa: riscv64
  operating_systems:
    - linux
  environments:
    - board

execution_model:
  kind: vector_cpu_extension
  attachment: cpu_extension
  submission_model: inline_cpu_instructions
  compiler_recovery_stage: llvmcpu_codegen

isa:
  base: riscv64
  features:
    - +m
    - +a
    - +f
    - +d
    - +c
    - +v
    - +zvl256b
    - +xsmtvdot
  exposure:
    kind: llvm_intrinsics
    needs_llvm_backend_changes: true
    needs_new_intrinsics: true
    needs_new_feature_bits: true
  state_model:
    kind: explicit_ssa
  register_constraints:
    accumulator_register_file: vector
    even_alignment_required: true
    vl_dependent: true

operations:
  compute:
    - name: matmul
      native: true
      type_triples:
        - i8*i8->i32
        - f8e4m3*f8e4m3->f16
        - f8e4m3*f8e4m3->f32
    - name: dot_product
      native: true
      type_triples:
        - i8*i8->i32
  movement:
    - vector_load
    - vector_store
  synchronization:
    - fence

geometry:
  compute_array:
    kind: vector_dot
  vector:
    vlen_bits: 256
    dlen_bits: 256
  native_tile_options:
    - [4, 8, 4]
    - [8, 8, 8]
  preferred_tiles:
    - [4, 8, 4]

memory:
  spaces:
    - name: global
      kind: dram
    - name: vector_registers
      kind: register_file
  preferred_layouts:
    lhs: mmt4d_lhs
    rhs: mmt4d_rhs
    result: mmt4d_result
  packing:
    requires_pack: false
    requires_unpack: false

numeric:
  legal_type_triples:
    - i8*i8->i32
    - f8e4m3*f8e4m3->f16
    - f8e4m3*f8e4m3->f32
  quantization:
    requantize_native: false
  rounding_modes:
    - rne
  saturation: true

runtime:
  required: false
  executable_format: llvm_cpu_vmfb
  driver:
    backend_id: null
    uri_schemes: []
  synchronization:
    semaphores: false
    timelines: false

verification:
  golden_model:
    available: true
    kind: cpu_reference
  simulator:
    available: false
    kind: none
  rtl:
    available: false
    kind: none
  perf_counters:
    available: false
    kind: none
  tolerances:
    fp8:
      atol: 0.125
      rtol: 0.05

access:
  model: local_device
  sdk_requirements:
    - spacemit_toolchain
    - iree_llvmcpu
  credential_requirements: none
  availability_class: sdk_install_required
  verification_gates:
    - compile_only
    - smoke_run

references:
  - docs/dev_blog/2026-03-13-riscv-mmt4d-ukernel-workstream.md
  - models/spacemit_x60.yaml
  - build_tools/hardware/spacemit_x60.yaml
  - third_party/iree_bar/third_party/llvm-project/llvm/include/llvm/IR/IntrinsicsRISCVXSpacemiT.td
