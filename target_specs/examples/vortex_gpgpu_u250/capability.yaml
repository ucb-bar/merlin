schema_version: 1

target:
  name: vortex_gpgpu_u250
  display_name: Vortex GPGPU U250
  vendor: Vortex
  maturity: planned

platform:
  host_isa: riscv64
  operating_systems:
    - linux
  environments:
    - board

execution_model:
  kind: simt_gpu
  attachment: device
  submission_model: queue_dispatch
  compiler_recovery_stage: text_isa_export

isa:
  base: vortex_gpu
  features:
    - simt
    - custom_gpu_isa
    - fpga_transport
  exposure:
    kind: custom_exporter
    needs_llvm_backend_changes: false
    needs_new_intrinsics: false
    needs_new_feature_bits: false
  state_model:
    kind: runtime_managed_device_state
  register_constraints:
    accumulator_register_file: null
    even_alignment_required: false
    vl_dependent: false

operations:
  compute:
    - name: simt_kernel
      native: true
      type_triples:
        - generic
    - name: matmul
      native: true
      type_triples:
        - i8*i8->i32
  movement:
    - device_copy
    - host_transfer
  synchronization:
    - semaphore

geometry:
  compute_array:
    kind: simt
  vector: {}
  native_tile_options:
    - [32, 8, 8]
  preferred_tiles:
    - [32, 8, 8]

memory:
  spaces:
    - name: global
      kind: dram
    - name: shared
      kind: shared_memory
    - name: registers
      kind: register_file
  preferred_layouts:
    lhs: row_major
    rhs: row_major
    result: row_major
  packing:
    requires_pack: false
    requires_unpack: false

numeric:
  legal_type_triples:
    - i8*i8->i32
  quantization:
    requantize_native: false
  rounding_modes:
    - rne
  saturation: true

runtime:
  required: true
  executable_format: vmfb_plus_vortex_binary
  driver:
    backend_id: vortex
    uri_schemes:
      - vortex://u250
  synchronization:
    semaphores: true
    timelines: false

verification:
  golden_model:
    available: true
    kind: host_reference
  simulator:
    available: true
    kind: fpga_emulation
  rtl:
    available: false
    kind: none
  perf_counters:
    available: false
    kind: none
  tolerances:
    int8:
      atol: 0
      rtol: 0

access:
  model: board
  sdk_requirements:
    - fpga_runtime
    - vortex_toolchain
  credential_requirements: none
  availability_class: lab_hardware
  verification_gates:
    - compile_only
    - smoke_run

references:
  - docs/architecture/target_generator.md
  - docs/how_to/add_runtime_hal_driver.md
  - docs/reference/cli.md
