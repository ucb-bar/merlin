schema_version: 1

target:
  name: radiance_muon
  display_name: Radiance Muon
  vendor: UCB-BAR
  maturity: experimental

platform:
  host_isa: riscv64
  operating_systems:
    - linux
  environments:
    - runtime-driver

execution_model:
  kind: simt_gpu
  attachment: device
  submission_model: queue_dispatch
  compiler_recovery_stage: runtime_only

isa:
  base: muon64
  features:
    - simt
    - predication
    - custom_gpu_isa
  exposure:
    kind: hal_runtime
    needs_llvm_backend_changes: false
    needs_new_intrinsics: false
    needs_new_feature_bits: false
  state_model:
    kind: runtime_managed_device_state
  register_constraints:
    accumulator_register_file: null
    even_alignment_required: false
    vl_dependent: false

operations:
  compute:
    - name: simt_kernel
      native: true
      type_triples:
        - generic
    - name: matmul
      native: true
      type_triples:
        - f16*f16->f16
  movement:
    - device_copy
    - host_transfer
  synchronization:
    - semaphore
    - event

geometry:
  compute_array:
    kind: simt
  vector: {}
  native_tile_options:
    - [32, 1, 1]
  preferred_tiles:
    - [32, 1, 1]

memory:
  spaces:
    - name: global
      kind: dram
    - name: shared
      kind: shared_memory
    - name: registers
      kind: register_file
  preferred_layouts:
    lhs: row_major
    rhs: row_major
    result: row_major
  packing:
    requires_pack: false
    requires_unpack: false

numeric:
  legal_type_triples:
    - f16*f16->f16
  quantization:
    requantize_native: false
  rounding_modes:
    - rne
  saturation: false

runtime:
  required: true
  executable_format: vmfb_plus_device_executable
  driver:
    backend_id: radiance
    uri_schemes:
      - radiance://direct
      - radiance://rpc
      - radiance://kmod
  synchronization:
    semaphores: true
    timelines: true

verification:
  golden_model:
    available: true
    kind: host_reference
  simulator:
    available: false
    kind: none
  rtl:
    available: false
    kind: none
  perf_counters:
    available: false
    kind: none
  tolerances:
    fp16:
      atol: 0.01
      rtol: 0.01

access:
  model: local_device
  sdk_requirements:
    - radiance_runtime
  credential_requirements: none
  availability_class: sdk_install_required
  verification_gates:
    - compile_only
    - device_query
    - smoke_run

references:
  - runtime/src/iree/hal/drivers/radiance/README.md
  - docs/dev_blog/2026-03-11-radiance-hal-workstream-log.md
  - docs/architecture/radiance_author_questions.md
