default_hw: OPU

generic:
  - --iree-hal-target-backends=llvm-cpu
  - --iree-llvmcpu-target-triple=riscv64-unknown-linux-gnu
  - --iree-llvmcpu-target-abi=lp64d
  - --iree-opt-data-tiling=true
  - --iree-dispatch-creation-data-tiling=true
  - --iree-llvmcpu-enable-ukernels=all
  - --iree-llvmcpu-link-ukernel-bitcode=true
  - --iree-llvmcpu-enable-vector-contract-custom-kernels=true
  - --iree-vm-bytecode-module-strip-source-map=true
  - --iree-vm-emit-polyglot-zip=false

targets:
  # OPU: VOPACC for dense matmuls (MLP, LLM attention/FFN)
  OPU:
    - --iree-opt-level=O3
    - --iree-llvmcpu-target-cpu-features=+m,+a,+f,+d,+c,+v,+zvl128b,+xopu
    - --iree-llvmcpu-target-vector-width-in-bytes=16
  # OPU_LLM: For LLM models with multi-head projections.
  # No --iree-opt-level: O3 re-fuses the collapse pass (IREE SinkReshapes).
  OPU_LLM:
    - --iree-llvmcpu-target-cpu-features=+m,+a,+f,+d,+c,+v,+zvl128b,+xopu
    - --iree-llvmcpu-target-vector-width-in-bytes=16
  # OPU_IM2COL: For CNN models — use im2col to convert convs to matmuls.
  # Uses CPU encoding (no +xopu) because the OPU materializer doesn't yet
  # handle im2col-generated dispatch shapes. The matmuls still get OPU
  # VOPACC at runtime via iree_uk_mmt4d hardware detection.
  # No --iree-opt-level: O2/O3 crash with im2col on RISC-V (IREE bug).
  OPU_IM2COL:
    - --iree-llvmcpu-target-cpu-features=+m,+a,+f,+d,+c,+v,+zvl128b
    - --iree-llvmcpu-target-vector-width-in-bytes=16
  RVV:
    - --iree-opt-level=O3
    - --iree-llvmcpu-target-cpu-features=+m,+a,+f,+d,+c,+v,+zvl256b
    - --iree-llvmcpu-target-vector-width-in-bytes=32

quantized:
  - --iree-llvmcpu-skip-intermediate-roundings=true
  - --iree-llvmcpu-stack-allocation-limit=64mib

models:
  # LLM models with multi-head projections: collapse multi-N contractions
  # so Q/K/V projections flow through encoding → mmt4d → OPU ukernel.
  # No --iree-opt-level: O3 re-fuses the collapse (IREE SinkReshapes bug).
  tinyllama:
    - --iree-preprocessing-pass-pipeline=builtin.module(func.func(iree-preprocessing-collapse-multi-n-contractions))
  # CNN models: im2col preprocessing. Use --hw OPU_IM2COL.
  dronet:
    - --iree-preprocessing-pass-pipeline=builtin.module(util.func(iree-preprocessing-convert-conv-to-channels-last), util.func(iree-global-opt-quantized-conv-to-conv), util.func(iree-global-opt-convert-conv2d-to-img2col))
  mobilenet_v2:
    - --iree-preprocessing-pass-pipeline=builtin.module(util.func(iree-preprocessing-convert-conv-to-channels-last), util.func(iree-global-opt-quantized-conv-to-conv), util.func(iree-global-opt-convert-conv2d-to-img2col))
  glpdepth:
    - --iree-preprocessing-pass-pipeline=builtin.module(util.func(iree-preprocessing-convert-conv-to-channels-last), util.func(iree-global-opt-quantized-conv-to-conv), util.func(iree-global-opt-convert-conv2d-to-img2col))
  yolov8_nano:
    - --iree-preprocessing-pass-pipeline=builtin.module(util.func(iree-preprocessing-convert-conv-to-channels-last), util.func(iree-global-opt-quantized-conv-to-conv), util.func(iree-global-opt-convert-conv2d-to-img2col))
