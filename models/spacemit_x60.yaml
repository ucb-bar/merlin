# models/spacemit_x60.yaml

default_hw: RVV

generic:
  - --iree-hal-target-backends=llvm-cpu
  - --iree-llvmcpu-target-triple=riscv64-unknown-linux-gnu
  - --iree-llvmcpu-target-abi=lp64d
  - --iree-opt-data-tiling=true
  - --iree-llvmcpu-enable-ukernels=none
  - --iree-llvmcpu-link-ukernel-bitcode=false
  - --iree-execution-model=async-external

targets:
  # RVV-enabled (vector) codegen.
  RVV:
    - --iree-llvmcpu-target-cpu-features=+m,+a,+f,+d,+c,+v,+zvl256b
    - --iree-codegen-mmt4d-use-intrinsics
    - --iree-llvmcpu-enable-vector-contract-custom-kernels=true
    - --iree-llvmcpu-loop-vectorization=true
    - --iree-llvmcpu-target-vector-width-in-bytes=32
    - --riscv-v-fixed-length-vector-lmul-max=2

  # Scalar-only (no V extension). Useful as a baseline and/or for cores without RVV.
  scalar:
    - --iree-llvmcpu-target-cpu-features=+m,+a,+f,+d,+c
    - --iree-codegen-mmt4d-use-intrinsics=false
    - --iree-llvmcpu-enable-vector-contract-custom-kernels=false
    - --iree-llvmcpu-loop-vectorization=false

quantized:
  - --iree-llvmcpu-skip-intermediate-roundings=true

models:
  dronet:
    - --iree-preprocessing-pass-pipeline=builtin.module(util.func(iree-global-opt-quantized-conv-to-conv, iree-preprocessing-convert-conv2d-to-img2col))
  smolVLA:
    - --iree-input-type=torch
    - --iree-opt-const-eval=false
    - --iree-input-promote-bf16-to-f32
    - --iree-opt-data-tiling=false
  smolvla_mx:
    - --iree-input-type=torch
    - --iree-opt-const-eval=false
    - --iree-global-opt-enable-demote-contraction-inputs-to-bf16=matmul
    - --iree-opt-data-tiling=false
  smolvlm_expert_decode:
    - --iree-input-type=onnx
    - --iree-opt-data-tiling=false
  smolvlm_expert_prefill:
    - --iree-input-type=onnx
    - --iree-opt-data-tiling=false
  smolvlm_text:
    - --iree-input-type=onnx
    - --iree-opt-data-tiling=false
  smolvlm_vision:
    - --iree-input-type=onnx
    - --iree-opt-data-tiling=false
  action_in_projector:
    - --iree-input-type=onnx
    - --iree-opt-data-tiling=false
  action_out_projector:
    - --iree-input-type=onnx
    - --iree-opt-data-tiling=false
  state_projector:
    - --iree-input-type=onnx
    - --iree-opt-data-tiling=false
  time_in_projector:
    - --iree-input-type=onnx
    - --iree-opt-data-tiling=false
  time_out_projector:
    - --iree-input-type=onnx
    - --iree-opt-data-tiling=false
