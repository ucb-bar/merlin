site_name: Merlin Compiler Infrastructure for UCB-BAR
site_description: Docs for Merlin (Setup, Tutorial, API, etc)
repo_url: https://github.com/ucb-bar/merlin
edit_uri: edit/main/docs/
docs_dir: docs
strict: true
validation:
  nav:
    omitted_files: ignore

theme:
  name: material
  # 1. Add the Merlin Logo
  logo: assets/merlin_transparent.png
  favicon: assets/merlin_transparent.png # Optional: makes the logo your site favicon too

  # 2. Set the primary text font to Inter
  font:
    text: Inter
    code: Roboto Mono # You can change this to Fira Code or another monospace font if preferred

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - content.code.copy
    - content.code.annotate

  # 3. Set colors to 'custom' to allow CSS overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

# 4. Link a custom stylesheet for the colors and secondary font
extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - .
            - tools
          options:
            allow_inspection: false
            show_source: false
            show_root_heading: true
            docstring_options:
              warn_unknown_params: false
              warn_missing_types: false
              warnings: false
  - mkdoxy:
      enabled: !ENV [MKDOXY_ENABLED, false]
      doxygen-bin-path: !ENV [DOXYGEN_BIN, doxygen]
      projects:
        merlin_cpp:
          src-dirs: "compiler/src/merlin compiler/plugins samples benchmarks"
          api-path: "reference/cpp_api"
          doxy-cfg:
            GENERATE_HTML: NO
            GENERATE_XML: YES
            EXTRACT_ALL: YES
            RECURSIVE: YES
            FILE_PATTERNS: "*.c *.cc *.cpp *.h *.hpp"
            EXCLUDE_PATTERNS: "*/__pycache__/* */compiled_models/* */compilation_phases*/* */report_pt_export/*"

hooks:
  - docs/hooks.py

markdown_extensions:
  - admonition
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      check_paths: true

nav:
  - Home: index.md
  - Setup & Tutorials:
      - Getting Started: getting_started.md
      - Getting Started / Installation: iree_setup.md
      - Cross-Compiling for Banana Pi: reproducibility/cross_compile_banana_pi.md
      - Build Types: different_build_types.md
      - Build Tracy on Ubuntu: build_tracy_ubuntu.md
  - Repository Guide: repository_guide.md
  - Architecture:
      - Plugin & Patch Model: architecture/plugin_and_patch_model.md
      - Repo Maintenance Model: architecture/repo-maintenance-model.md
      - CMake Presets: architecture/cmake_presets.md
  - Reference:
      - Overview: reference/overview.md
      - CLI Commands: reference/cli.md
      - Python API: reference/python/index.md
      - C/C++ API: reference/cpp.md
      - MLIR Dialects & Passes: reference/mlir.md
      - CMake Targets: reference/cmake_targets.md
