      - CMake Presets: architecture/cmake_presets.md
      - Target Generator: architecture/target_generator.md
      - Ray Control Plane: architecture/ray_control_plane.md
      - NPU Compilation Pipeline: architecture/npu_compilation_pipeline.md
  - Reference:
