site_name: Merlin Compiler Infrastructure for UCB-BAR
site_description: Docs for Merlin (Setup, Tutorial, API, etc)
repo_url: https://github.com/ucb-bar/merlin
edit_uri: edit/main/docs/
docs_dir: docs

theme:
  variant: classic
  logo: assets/merlin_transparent.png
  favicon: assets/merlin_transparent.png

  # Set the primary text font to Open Sans per UC Berkeley guidelines
  font:
    text: Open Sans
    code: Roboto Mono

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - content.code.copy
    - content.code.annotate

  palette:
    # Light Mode (Default)
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark Mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - .
            - tools
          options:
            allow_inspection: false
            show_source: false
            show_root_heading: true
            docstring_options:
              warn_unknown_params: false
              warn_missing_types: false
              warnings: false
  - mkdoxy:
      enabled: !ENV [MKDOXY_ENABLED, false]
      doxygen-bin-path: !ENV [DOXYGEN_BIN, doxygen]
      projects:
        merlin_cpp:
          src-dirs: "compiler/src/merlin compiler/plugins samples benchmarks"
          api-path: "reference/cpp_api"
          doxy-cfg:
            GENERATE_HTML: NO
            GENERATE_XML: YES
            EXTRACT_ALL: YES
            RECURSIVE: YES
            FILE_PATTERNS: "*.c *.cc *.cpp *.h *.hpp"
            EXCLUDE_PATTERNS: "*/__pycache__/* */compiled_models/* */compilation_phases*/* */report_pt_export/*"

markdown_extensions:
  - admonition
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      check_paths: true

nav:
  - Home: index.md
  - Get Started:
      - Quick start: getting_started.md
      - User paths: user_paths.md
      - Build types: different_build_types.md
  - How-To:
      - Overview: how_to/index.md
      - SmolVLA End-to-End: how_to/smolvla_end_to_end.md
      - Add Compiler Dialect Plugin: how_to/add_compiler_dialect_plugin.md
      - Add/Modify HAL Driver: how_to/add_runtime_hal_driver.md
      - Add Sample Application: how_to/add_sample_application.md
      - Add Compile Target: how_to/add_compile_target.md
      - Use build.py: how_to/use_build_py.md
      - Cross-compile for Banana Pi: reproducibility/cross_compile_banana_pi.md
      - Export TinyLlama 8-bit to MLIR: reproducibility/export_tinyllama_8bit_sharktank_to_mlir.md
      - Reproduce ukernel benchmark: reproducibility/reproduce_ukernel_benchmark_firesim.md
      - Build Tracy on Ubuntu: build_tracy_ubuntu.md
  - Hardware Backends:
      - Overview: hardware_backends/overview.md
