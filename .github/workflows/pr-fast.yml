name: PR Fast Checks

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: pr-fast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-config-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Pre-commit (changed files)
        # Runs every pre-commit hook on the diff this PR introduces.
        # Scoped to changed files so pre-existing tech debt does not block
        # unrelated PRs; new violations are still caught.
        if: github.event_name == 'pull_request'
        run: |
          pip install pre-commit
          pre-commit run \
            --from-ref ${{ github.event.pull_request.base.sha }} \
            --to-ref ${{ github.event.pull_request.head.sha }} \
            --show-diff-on-failure

      - name: Lint scripts and python entrypoints
        run: |
          python3 tools/merlin.py ci lint

      - name: Check CLI docs drift
        run: |
          python3 tools/merlin.py ci cli-docs-drift

      - name: Validate upstream tracking config
        run: |
          python3 tools/merlin.py ci release-status --offline --json

      - name: Smoke test merlin CLI
        # Catches import errors and broken argparse setup. ~2s overhead.
        run: |
          python3 tools/merlin.py --help > /dev/null
          for sub in build compile setup ci patches benchmark chipyard ray targetgen; do
            python3 tools/merlin.py "$sub" --help > /dev/null
          done

      - name: Validate conda env files
        run: |
          python3 -c "import yaml; yaml.safe_load(open('env_linux.yml')); yaml.safe_load(open('env_macOS.yml'))"

      - name: Run Python tests
        run: |
          pip install pytest pyyaml
          pytest tests/ -v --tb=short
