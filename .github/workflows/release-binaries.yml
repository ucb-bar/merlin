name: release-binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  host-macos:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init core submodules only
        run: |
          python3 tools/setup.py submodules --submodules-profile core --submodule-sync

      - uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: merlin-dev
          environment-file: env_macOS.yml
          auto-activate-base: false

      - name: Sync Python deps
        shell: bash -el {0}
        run: |
          uv sync

      - name: Build packaged macOS host artifact
        shell: bash -el {0}
        run: |
          uv run tools/merlin.py build --profile package-host
          mv dist/host-merlin-perf.tar.gz dist/merlin-host-macos.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: merlin-host-macos
          path: dist/merlin-host-macos.tar.gz

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - host-macos
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: merlin-host-macos
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/merlin-host-macos.tar.gz
          draft: true
