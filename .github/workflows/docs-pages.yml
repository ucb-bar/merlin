name: Docs Pages

on:
  pull_request:
    paths:
      - "mkdocs.yml"
      - "docs/**"
      - "tools/**"
      - "models/**"
      - "compiler/**"
      - "samples/**"
      - "benchmarks/**"
      - ".github/workflows/docs-pages.yml"
  push:
    branches:
      - main
    paths:
      - "mkdocs.yml"
      - "docs/**"
      - "tools/**"
      - "models/**"
      - "compiler/**"
      - "samples/**"
      - "benchmarks/**"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen mlir-18-tools libmlir-18-dev

      - name: Resolve mlir-tblgen path
        run: |
          if command -v mlir-tblgen >/dev/null 2>&1; then
            echo "MLIR_TBLGEN=$(command -v mlir-tblgen)" >> "$GITHUB_ENV"
          elif [ -x /usr/lib/llvm-18/bin/mlir-tblgen ]; then
            echo "MLIR_TBLGEN=/usr/lib/llvm-18/bin/mlir-tblgen" >> "$GITHUB_ENV"
          else
            echo "mlir-tblgen not found"
            exit 1
          fi

      - name: Install documentation dependencies
        run: uv pip install --system -r docs/requirements.txt

      - name: Generate docs reference content
        env:
          MKDOXY_ENABLED: "true"
          DOXYGEN_BIN: doxygen
          NO_COLOR: "1"
          TERM: dumb
        run: uv run python docs/hooks.py

      - name: Build docs
        env:
          MKDOXY_ENABLED: "true"
          DOXYGEN_BIN: doxygen
          NO_COLOR: "1"
          TERM: dumb
        run: uv run zensical build --clean

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
