name: Docs Pages

on:
  pull_request:
    paths:
      - "mkdocs.yml"
      - "docs/**"
      - "tools/**"
      - "models/**"
      - "compiler/**"
      - "samples/**"
      - "benchmarks/**"
      - ".github/workflows/docs-pages.yml"
  push:
    branches:
      - main
    paths:
      - "mkdocs.yml"
      - "docs/**"
      - "tools/**"
      - "models/**"
      - "compiler/**"
      - "samples/**"
      - "benchmarks/**"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen mlir-18-tools

      - name: Install documentation dependencies
        run: uv pip install --system -r docs/requirements.txt

      - name: Build docs (strict)
        env:
          MLIR_TBLGEN: /usr/lib/llvm-18/bin/mlir-tblgen
          MKDOXY_ENABLED: "true"
          DOXYGEN_BIN: doxygen
          NO_COLOR: "1"
          TERM: dumb
        run: mkdocs build --strict

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
