name: Nightly Upstream Drift

on:
  workflow_dispatch:

jobs:
  drift-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Initialize required submodule(s)
        run: |
          git submodule update --init --recursive third_party/iree_bar

      - name: Verify patch state
        run: |
          python3 tools/merlin.py patches verify

      - name: Check upstream drift
        run: |
          python3 tools/merlin.py patches drift
