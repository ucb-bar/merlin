name: Nightly Upstream Drift

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  drift-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify patch state
        run: |
          python3 tools/merlin.py patches verify

      - name: Check upstream drift
        run: |
          python3 tools/merlin.py patches drift
