name: merlin-dev
channels:
  - conda-forge
dependencies:
  # 1. Python & Modern Package Manager
  - python=3.11
  - uv

  # 2. Build Tools
  - cmake
  - ninja
  - make
  - pkg-config
  - ccache

  # 3. Compilers
  - clang
  - clangxx
  - gxx_linux-64
  - lld

  # 4. System / GUI / Networking Libraries
  - wayland
  - wayland-protocols
  - xorg-libx11
  - xorg-libxext
  - libglvnd
  - libegl
  - glfw
  - libcurl
  - openssl
  - zstd
  - pre-commit
  - nodejs
